<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t;try{t=localStorage.getItem('theme')}catch(e){}if(t!=='light'&&t!=='dark'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})()</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티모 매거진 | 프리미엄 펫케어 가이드</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <link rel="stylesheet" href="/special-chars/theme.css">
    <meta name="theme-color" content="#6366f1">
    
    <meta name="description" content="공식 데이터와 수의학 논문을 기반으로 한 프리미엄 펫케어 매거진입니다.">
    <link rel="canonical" href="https://teemozipsa.github.io/blog/">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-body); color: var(--text-secondary); min-height: 100vh; line-height: 1.6; }
        header { border-bottom: 1px solid var(--border); background: var(--bg-card); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); background: rgba(var(--bg-card-rgb), 0.85); }
        .header-inner { max-width: 800px; margin: 0 auto; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
        .back-link { font-weight: 700; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 6px; font-size: 15px; }
        .back-link:hover { color: var(--accent); }
        .brand-logo { font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 4px; }
        .wrap { max-width: 800px; margin: 60px auto 100px; padding: 0 20px; }
        h1 { font-size: 32px; font-weight: 800; color: var(--text-primary); margin-bottom: 16px; text-align: center; }
        p.desc { text-align: center; margin-bottom: 40px; }
        
        .static-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .static-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-decoration: none; color: inherit; transition: transform 0.2s; }
        .static-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .sc-tag { display: inline-block; background: var(--bg-hover); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 12px; margin-bottom: 12px; }
        .sc-title { font-size: 20px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
        .sc-desc { color: var(--text-muted); font-size: 15px; }

        /* 자바스크립트가 동작할 경우 SPA 메인화면 매거진 탭으로 즉시 리다이렉트 */
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            티모집사 홈으로
        </a>
        <div class="brand-logo">🐾 티모 매거진 구조 색인</div>
    </div>
</header>

<main class="wrap">
    <h1>티모 매거진 아티클 목록</h1>
    <p class="desc">Google 검색 로봇 수집용 정적(Static) 구조도입니다.</p>

    <div class="static-grid">
        <a href="/blog/cat-age-guide/" class="static-card">
            <span class="sc-tag">고양이 팩트체크</span>
            <h2 class="sc-title">고양이 나이 계산의 새로운 기준: 1년이 7년이라는 거짓말</h2>
            <p class="sc-desc">AAFP 공식 가이드라인을 기반으로 진짜 고양이 나이를 계산하고 노화 주기별 핵심 케어 방법을 알아봅니다.</p>
        </a>
        <!-- 추후 아티클이 추가되면 여기에 수동 혹은 정적 생성기로 추가합니다 -->
    </div>
</main>

<script>
    // 일반 유저가 이 URL로 접근한 경우, 메인 페이지의 프리미엄 UI 매거진 탭으로 SPA 리다이렉트 시킨다.
    // window.location.replace("/?tab=magazine");
</script>

</body>
</html>
