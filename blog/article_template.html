<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t;try{t=localStorage.getItem('theme')}catch(e){}if(t!=='light'&&t!=='dark'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})()</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ARTICLE_TITLE}} | 티모 매거진</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/special-chars/theme.css">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="{{ARTICLE_SUMMARY}}">
    <link rel="canonical" href="https://teemozipsa.github.io/blog/{{ARTICLE_SLUG}}/">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-body); color: var(--text-primary); min-height: 100vh; line-height: 1.8; }
        
        /* Top Utility Bar */
        .top-bar { display: flex; justify-content: center; gap: 20px; padding: 10px 0; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .top-bar a { color: var(--text-primary); text-decoration: none; }
        .top-bar span { color: #e60000; }
        
        /* Header */
        .logo-header { max-width: 800px; margin: 0 auto; padding: 30px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--text-primary); }
        .logo-text { font-family: 'Impact', sans-serif; font-size: 32px; color: transparent; -webkit-text-stroke: 1px #e60000; text-decoration: none; }
        html[data-theme="dark"] .logo-text { -webkit-text-stroke: 1.5px #ff4d4d; }
        .btn-outline { border: 2px solid var(--text-primary); color: var(--text-primary); padding: 4px 12px; font-weight: 800; font-size: 13px; text-decoration: none; }
        
        /* Article Container */
        .article-wrap { max-width: 800px; margin: 50px auto; padding: 0 15px; }
        
        .article-header { text-align: center; margin-bottom: 40px; }
        .article-tag { color: #e60000; font-size: 14px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: inline-block; }
        .article-title { font-family: 'Playfair Display', 'Nanum Myeongjo', serif; font-size: 38px; font-weight: 800; line-height: 1.3; margin-bottom: 20px; word-break: keep-all; }
        .article-meta { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        
        .article-hero-img { width: 100%; height: auto; outline: 3px solid var(--text-primary); margin-bottom: 40px; }
        
        .article-content { font-size: 18px; color: var(--text-secondary); }
        .article-content h2 { font-size: 26px; color: var(--text-primary); margin: 40px 0 20px; font-weight: 800; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .article-content p { margin-bottom: 25px; }
        
        .mag-footer { border-top: 4px solid var(--text-primary); padding: 30px 0; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-top: 60px; text-transform: uppercase; }
        a { color: #e60000; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="/">GO TO TOOLS</a><span>•</span><a href="/special-chars/bmi-calc/">PLAY CALCULATOR</a>
</div>

<header class="logo-header">
    <a href="/blog/" class="logo-text">TEEMO MAGAZINE</a>
    <a href="/blog/" class="btn-outline">← BACK TO LIST</a>
</header>

<main class="article-wrap">
    <header class="article-header">
        <span class="article-tag">{{ARTICLE_TAG}}</span>
        <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
        <div class="article-meta">By {{ARTICLE_AUTHOR}} | {{DATE}}</div>
    </header>

    <img src="{{ARTICLE_THUMBNAIL}}" alt="Article Hero" class="article-hero-img">

    <div class="article-content">
        <!-- AI가 여기에 HTML 본문을 삽입합니다. -->
        <p>본문 내용이 여기에 들어갑니다. 단락은 p 태그로 감싸주세요.</p>
        
        <h2>소제목 예시</h2>
        <p>추가적인 설명을 작성합니다.</p>
    </div>
</main>

<footer class="mag-footer">
    &copy; 2026 TEEMO MAGAZINE. Daily dose of feline obsession.
</footer>

</body>
</html>
